    <article class="main-contant">
        <script>
            let at = false;
            var ck = [];
            var nuus = [];
            var id, ip;
            var nuu = 0;
            var nub = Object.keys(dataweb['users']).length;


            for (let p in dataweb['users']) {
                for (let i = 0; i < Object.keys(dataweb['users'][p]['PHOTO']).length; i++) {
                    ck.push([parseInt(p), i])
                    nuus.push(nuu)
                    nuu++
                }
            }
            let nn = nuus.length
            let cs
            if (nuu > 15) {
                nuu = 15;
            }
            for (let i = 0; i < nuu; i++) {
                cc = Math.floor(Math.random() * (nn - 1))
                cs = nuus[cc];
                nn = nuus.length
                nuus.splice(cc, 1)
                id = ck[cs][0]
                ip = ck[cs][1]
                document.write('<div class="item-'+i+'">' +
                    '<a href="./picture.html?id=' + (1000000 + id) + '&p=' + ip +'" class="crad">' +
                    '<img src="'+dataweb['users'][id]['PHOTO'][ip]+'" alt="">' +
                    '</a>' +
                    '</div>')
            }

        </script>
